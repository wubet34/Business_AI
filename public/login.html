<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Business AI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast-container"></div>
<button class="theme-toggle-float" onclick="toggleTheme()" id="theme-toggle" title="Toggle theme">
  <i class="fa-solid fa-sun"></i>
</button>

<div class="auth-wrap">

  <!-- Login Card -->
  <div class="auth-card" id="login-card">
    <div class="auth-logo">
      <h1><i class="fa-solid fa-bolt"></i> Business AI</h1>
      <p>Sign in to your dashboard</p>
    </div>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email"><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;margin-top:4px">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="#" id="to-register">Register</a>
    </div>
  </div>

  <!-- Register Card -->
  <div class="auth-card" id="register-card" style="display:none">
    <div class="auth-logo">
      <h1><i class="fa-solid fa-bolt"></i> Business AI</h1>
      <p>Create your account</p>
    </div>
    <form id="register-form" novalidate>
      <div class="form-group">
        <label><i class="fa-solid fa-user"></i> Full Name</label>
        <input type="text" name="reg_name" class="form-control" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" name="reg_email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" name="reg_password" class="form-control" placeholder="Min 6 characters" required>
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-shield-halved"></i> Role</label>
        <select name="reg_role" class="form-control">
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;margin-top:4px">
        <i class="fa-solid fa-user-plus"></i> Create Account
      </button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="#" id="to-login">Sign In</a>
    </div>
  </div>

</div>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  initTheme();
  if (localStorage.getItem('sbms_user')) window.location.href = 'index.html';
  initAuth();
</script>
</body>
</html>
